<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }

        a {
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 URL Shortener</h2>

    <input type="text" id="urlInput" placeholder="Enter URL (https://example.com)">
    <br>
    <button onclick="shortenUrl()">Shorten</button>

    <div class="result" id="result"></div>
</div>

<script>
    function shortenUrl() {
        let url = document.getElementById("urlInput").value;

        fetch("http://localhost:8080/url/short", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url: url })
        })
        .then(response => response.text())
        .then(code => {
            let shortUrl = "http://localhost:8080/url/" + code;

            document.getElementById("result").innerHTML =
                'Short URL: <a href="' + shortUrl + '" target="_blank">' + shortUrl + '</a>';
        })
        .catch(error => {
            document.getElementById("result").innerText = "Error: " + error;
        });
    }
</script>

</body>
</html>
